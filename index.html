<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Edunexa - Tomy Satria</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.ibb.co/YSHKvYQ/Chat-GPT-Image-5-Jun-2026-22-30-27.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --primary: #4f46e5; --brand: #1e293b; --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 50%, #e2e8f0 100%); --card-bg: rgba(255, 255, 255, 0.65); --card-border: rgba(255, 255, 255, 0.8); --danger: #ef4444; --gray: #64748b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-gradient); background-attachment: fixed; margin: 0; padding: 16px; padding-bottom: 110px; color: #334155; }
        .header { text-align: center; padding: 20px 0 15px 0; }
        .card { background: var(--card-bg); backdrop-filter: blur(16px); padding: 20px; border-radius: 20px; border: 1px solid var(--card-border); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); margin-bottom: 20px; }
        select, input[type="text"], input[type="date"], textarea { width: 100%; padding: 14px 16px; margin-bottom: 16px; background: rgba(255, 255, 255, 0.9); border: 1px solid #cbd5e1; border-radius: 14px; box-sizing: border-box; font-size: 15px; color: var(--brand); }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); padding: 16px 20px 24px 20px; display: flex; gap: 12px; z-index: 100; border-top: 1px solid rgba(255,255,255,0.5); }
        button { border: none; font-weight: 800; cursor: pointer; padding: 16px; border-radius: 16px; }
        .btn-main { background: var(--primary); color: white; flex: 2; }
        .btn-side { background: #cbd5e1; color: var(--brand); flex: 1; }
        .btn-outline { background: white; border: 1px solid #cbd5e1; width: 100%; padding: 14px; border-radius: 14px; margin-bottom: 10px; }
        
        /* Layout Kelas (Urut ke bawah, lalu pindah kanan) */
        .class-grid { display: grid; grid-template-columns: 1fr 1fr; grid-auto-flow: column; grid-template-rows: repeat(6, auto); gap: 8px; margin-top: 15px; }
        .class-item { background: white; padding: 10px; border-radius: 10px; border: 1px solid #cbd5e1; font-size: 12px; font-weight: 600; }
        
        #activationGate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-gradient); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .gate-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .gate-id { background: #e0e7ff; padding: 15px; border-radius: 10px; font-weight: 800; font-family: monospace; font-size: 18px; margin: 15px 0; color: var(--primary); }
        .siswa-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 8px; border-bottom: 1px solid rgba(203, 213, 225, 0.5); }
        .nilai-input { width: 70px !important; text-align: center; font-weight: 800; color: var(--primary); height: 48px; border-radius: 12px; }
        .history-box { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .badge { background: rgba(255, 255, 255, 0.8); color: var(--gray); padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 700; border: 1px solid #cbd5e1; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-delete-badge { color: #ef4444; font-weight: 800; font-size: 16px; }
    </style>
</head>
<body>

<div id="activationGate" style="display:none;">
    <div class="gate-card">
        <h2 style="color: var(--brand);">Aktivasi Edunexa</h2>
        <div class="gate-id" id="myDeviceId">---</div>
        <input type="text" id="activationCode" style="text-align:center;" placeholder="Kode Aktivasi">
        <button class="btn-main" style="width: 100%;" onclick="checkActivation()">AKTIFKAN</button>
    </div>
</div>

<div id="classGate" style="display:none;">
    <div class="card">
        <h3>Pilih Kelas yang Diajar</h3>
        <div class="class-grid" id="classChecklist"></div>
        <button class="btn-main" style="width: 100%; margin-top: 20px;" onclick="saveClassSelection()">SIMPAN KELAS</button>
    </div>
</div>

<div id="inputArea" style="display:none;">
    <div class="header"><h1>INPUT NILAI EDUNEXA</h1></div>

    <div class="card">
        <h3>Kontrol Kelas</h3>
        <select id="mapel" onchange="renderSiswa()"></select>
        <button class="btn-outline" onclick="showClassGate()">EDIT DAFTAR KELAS</button>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between;"><h3>Data Siswa</h3><span id="displayJml" style="font-size:12px; font-weight:800; color:var(--danger);">0 Siswa</span></div>
        <button class="btn-outline" onclick="toggleSetup()">EDIT DAFTAR NAMA</button>
    </div>

    <div class="card">
        <h3>Arsip Materi</h3>
        <div id="riwayatMateri" class="history-box"></div>
    </div>

    <div class="card">
        <h3>Input Nilai Baru</h3>
        <button class="btn-outline" onclick="kosongkanForm()">+ INPUT MATERI BARU</button>
        <input type="date" id="tanggal">
        <input type="text" id="materi" placeholder="Nama Materi" oninput="refreshRiwayat()">
        <div id="listSiswaContainer"></div>
    </div>

    <div class="footer">
        <button class="btn-side" onclick="simpanKeHP()">SIMPAN</button>
        <button class="btn-main" onclick="bagikanCSV()">EKSPOR CSV</button>
    </div>
</div>

<div id="setupArea" style="display:none;">
    <div class="card">
        <h3>Pengaturan Nama Siswa</h3>
        <textarea id="rawSiswa" rows="10"></textarea>
        <button class="btn-main" style="width:100%" onclick="simpanSiswa()">SIMPAN NAMA</button>
        <button class="btn-outline" onclick="toggleSetup()">KEMBALI</button>
    </div>
</div>

<script>
    const KELAS_LIST = ["Kelas 1", "Kelas 2", "Kelas 3", "Kelas 4", "Kelas 5", "Kelas 6", "Kelas 1A", "Kelas 2A", "Kelas 3A", "Kelas 4A", "Kelas 5A", "Kelas 6A", "Kelas 1B", "Kelas 2B", "Kelas 3B", "Kelas 4B", "Kelas 5B", "Kelas 6B", "Kelas 1C", "Kelas 2C", "Kelas 3C", "Kelas 4C", "Kelas 5C", "Kelas 6C", "Kelas 1D", "Kelas 2D", "Kelas 3D", "Kelas 4D", "Kelas 5D", "Kelas 6D"];
    let dbNilai = JSON.parse(localStorage.getItem('db_edunexa_v8')) || {};
    let dbSiswa = JSON.parse(localStorage.getItem('db_siswa_v8')) || {};
    let activeClasses = JSON.parse(localStorage.getItem('active_classes')) || [];

    window.onload = () => {
        if (localStorage.getItem('edx_activated') === 'true') {
            if (activeClasses.length > 0) {
                document.getElementById('inputArea').style.display = 'block';
                const sel = document.getElementById('mapel');
                activeClasses.forEach(c => sel.innerHTML += `<option>${c}</option>`);
                renderSiswa();
            } else { showClassGate(); }
        } else { document.getElementById('activationGate').style.display = 'flex'; document.getElementById('myDeviceId').innerText = getDeviceId(); }
    };

    function showClassGate() { document.getElementById('inputArea').style.display = 'none'; document.getElementById('classGate').style.display = 'block'; const list = document.getElementById('classChecklist'); list.innerHTML = ""; KELAS_LIST.forEach(cls => { list.innerHTML += `<div class="class-item"><input type="checkbox" value="${cls}" ${activeClasses.includes(cls) ? 'checked' : ''}> ${cls}</div>`; }); }
    function saveClassSelection() { activeClasses = Array.from(document.querySelectorAll('#classChecklist input:checked')).map(cb => cb.value); localStorage.setItem('active_classes', JSON.stringify(activeClasses)); location.reload(); }
    function renderSiswa() { const cls = document.getElementById('mapel').value; const siswa = dbSiswa[cls] || []; const container = document.getElementById('listSiswaContainer'); container.innerHTML = ""; document.getElementById('displayJml').innerText = siswa.length + " Siswa"; siswa.forEach((n, i) => container.innerHTML += `<div class="siswa-row"><div class="nama-siswa">${i+1}. ${n}</div><input type="number" class="nilai-input" id="n-${i}" onfocus="this.select()"></div>`); document.getElementById('rawSiswa').value = siswa.join('\n'); refreshRiwayat(); const m = document.getElementById('materi').value; if(dbNilai[cls] && dbNilai[cls][m]) dbNilai[cls][m].forEach((v, i) => { const el = document.getElementById('n-'+i); if(el) el.value = v; }); }
    function simpanSiswa() { const cls = document.getElementById('mapel').value; dbSiswa[cls] = document.getElementById('rawSiswa').value.split('\n').map(s => s.trim()).filter(s => s !== ""); localStorage.setItem('db_siswa_v8', JSON.stringify(dbSiswa)); toggleSetup(); renderSiswa(); }
    function simpanKeHP() { const cls = document.getElementById('mapel').value; const m = document.getElementById('materi').value.trim(); if(!m) return alert("Isi Materi!"); if(!dbNilai[cls]) dbNilai[cls] = {}; dbNilai[cls][m] = (dbSiswa[cls] || []).map((_,i) => document.getElementById('n-'+i).value || "0"); localStorage.setItem('db_edunexa_v8', JSON.stringify(dbNilai)); alert("✅ Disimpan!"); refreshRiwayat(); }
    
    // Fungsi Pendukung (Aktivasi, Riwayat, dll tetap sama)
    function checkActivation() { const id = document.getElementById('myDeviceId').innerText; let t = 0; for(let i=0; i<id.length; i++) t += id.charCodeAt(i); if (document.getElementById('activationCode').value.trim().toUpperCase() === "INP" + (t * 1205) + "FTY") { localStorage.setItem('edx_activated', 'true'); location.reload(); } else alert("Kode salah!"); }
    function refreshRiwayat() { const cls = document.getElementById('mapel').value; const box = document.getElementById('riwayatMateri'); const mAktif = document.getElementById('materi').value.trim(); box.innerHTML = ""; if(dbNilai[cls]) { for(let m in dbNilai[cls]) { const b = document.createElement('span'); b.className='badge'; b.innerHTML = `${m} <span class="btn-delete-badge" onclick="hapusMateri(event, '${m}')">&times;</span>`; b.style.background = (m===mAktif)?'#e0e7ff':''; b.onclick = () => { document.getElementById('materi').value = m; renderSiswa(); }; box.appendChild(b); } } }
    function hapusMateri(e, m) { e.stopPropagation(); if(confirm("Hapus "+m+"?")) { const cls = document.getElementById('mapel').value; delete dbNilai[cls][m]; localStorage.setItem('db_edunexa_v8', JSON.stringify(dbNilai)); kosongkanForm(); } }
    function toggleSetup() { const s = document.getElementById('setupArea').style; const i = document.getElementById('inputArea').style; i.display = i.display === 'none' ? 'block' : 'none'; s.display = s.display === 'none' ? 'block' : 'none'; }
    function kosongkanForm() { document.getElementById('materi').value = ""; document.querySelectorAll('.nilai-input').forEach(i=>i.value=""); setTanggalHariIni(); refreshRiwayat(); }
    function bagikanCSV() { const cls = document.getElementById('mapel').value; const m = document.getElementById('materi').value.trim(); if(!m || !dbNilai[cls] || !dbNilai[cls][m]) return alert("Data tidak ada!"); let csv = "Nama;Nilai\n"; (dbSiswa[cls]||[]).forEach((n,i) => csv += n+";"+(dbNilai[cls][m][i]||"0")+"\n"); const f = new File([csv], `Nilai_${cls}_${m}.csv`, {type:'text/csv'}); if(navigator.canShare) navigator.share({files:[f]}).catch(()=>{}); else { const a=document.createElement('a'); a.href=URL.createObjectURL(f); a.download=f.name; a.click(); } }
    function getDeviceId() { let id = localStorage.getItem('edx_device_id') || 'DX-' + Math.floor(Math.random() * 900000 + 100000); localStorage.setItem('edx_device_id', id); return id; }
    function setTanggalHariIni() { document.getElementById('tanggal').value = new Date().toISOString().split('T')[0]; }
</script>
</body>
</html>
