<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Edunexa - Tomy Satria</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Input Edunexa">
    <link rel="apple-touch-icon" href="https://i.ibb.co/YSHKvYQ/Chat-GPT-Image-5-Jun-2026-22-30-27.png">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Edunexa%20Pro%22,%22short_name%22:%22Edunexa%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23e2e8f0%22,%22theme_color%22:%22%234f46e5%22,%22icons%22:[{%22src%22:%22https://i.ibb.co/YSHKvYQ/Chat-GPT-Image-5-Jun-2026-22-30-27.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        #activationGate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-gradient); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .gate-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .gate-id { background: #e0e7ff; padding: 15px; border-radius: 10px; font-weight: 800; font-family: monospace; font-size: 18px; margin: 15px 0; color: var(--primary); letter-spacing: 1px; }
        :root { --primary: #4f46e5; --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 50%, #e2e8f0 100%); --card-bg: rgba(255, 255, 255, 0.65); --card-border: rgba(255, 255, 255, 0.8); --danger: #ef4444; --gray: #64748b; --brand: #1e293b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-gradient); background-attachment: fixed; margin: 0; padding: 16px; padding-bottom: 110px; color: #334155; }
        .header { text-align: center; padding: 20px 0 15px 0; }
        .card { background: var(--card-bg); backdrop-filter: blur(16px); padding: 20px; border-radius: 20px; border: 1px solid var(--card-border); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); margin-bottom: 20px; }
        select, input[type="text"], textarea { width: 100%; padding: 14px 16px; margin-bottom: 16px; background: rgba(255, 255, 255, 0.9); border: 1px solid #cbd5e1; border-radius: 14px; box-sizing: border-box; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); padding: 16px 20px 24px 20px; display: flex; gap: 12px; z-index: 100; border-top: 1px solid rgba(255,255,255,0.5); }
        button { border: none; font-weight: 800; cursor: pointer; padding: 16px; border-radius: 16px; }
        .btn-main { background: var(--primary); color: white; flex: 2; }
        .btn-side { background: #cbd5e1; color: var(--brand); flex: 1; }
        .btn-outline { background: white; border: 1px solid #cbd5e1; width: 100%; padding: 14px; border-radius: 14px; }
        .siswa-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 8px; border-bottom: 1px solid rgba(203, 213, 225, 0.5); }
        .nilai-input { width: 70px !important; text-align: center; font-weight: 800; color: var(--primary); height: 48px; border-radius: 12px; }
        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="activationGate" style="display:none;">
    <div class="gate-card">
        <img src="https://i.ibb.co/YSHKvYQ/Chat-GPT-Image-5-Jun-2026-22-30-27.png" alt="Logo" style="width: 70px; height: 70px; object-fit: contain; margin-bottom: 10px;">
        <h2>Aktivasi Edunexa</h2>
        <div class="gate-id" id="myDeviceId">---</div>
        <input type="text" id="activationCode" style="text-align:center;" placeholder="Masukkan Kode Aktivasi">
        <button class="btn-main" style="width: 100%;" onclick="checkActivation()">AKTIFKAN</button>
    </div>
</div>

<div id="classSelectionArea" style="display:none;">
    <div class="card">
        <h3>Ceklis Kelas yang Diajar</h3>
        <div class="checkbox-grid" id="classChecklist"></div>
        <button class="btn-main" style="width: 100%; margin-top: 20px;" onclick="saveClassSelection()">SIMPAN KELAS</button>
    </div>
</div>

<div id="inputArea" style="display:none;">
    <div class="header"><h1>INPUT NILAI EDUNEXA</h1></div>
    <div class="card">
        <h3>Pilih Kelas</h3>
        <select id="mapel" onchange="renderSiswa()"></select>
        <button class="btn-outline" onclick="toggleSetup()">EDIT DAFTAR NAMA</button>
    </div>
    <div class="card" id="listSiswaContainer"></div>
    <div class="footer">
        <button class="btn-side" onclick="simpanKeHP()">SIMPAN</button>
        <button class="btn-main" onclick="bagikanCSV()">EKSPOR CSV</button>
    </div>
</div>

<div id="setupArea" style="display:none;">
    <div class="card">
        <h3>Pengaturan Nama Siswa</h3>
        <textarea id="rawSiswa" rows="10"></textarea>
        <button class="btn-main" style="width:100%" onclick="simpanSiswa()">SIMPAN NAMA</button>
        <button class="btn-outline" onclick="toggleSetup()">KEMBALI</button>
    </div>
</div>

<script>
    const CLASSES = ["Kelas 1", "Kelas 1A", "Kelas 1B", "Kelas 1C", "Kelas 1D", "Kelas 2", "Kelas 2A", "Kelas 2B", "Kelas 2C", "Kelas 2D", "Kelas 3", "Kelas 3A", "Kelas 3B", "Kelas 3C", "Kelas 3D", "Kelas 4", "Kelas 4A", "Kelas 4B", "Kelas 4C", "Kelas 4D", "Kelas 5", "Kelas 5A", "Kelas 5B", "Kelas 5C", "Kelas 5D", "Kelas 6", "Kelas 6A", "Kelas 6B", "Kelas 6C", "Kelas 6D"];
    const SALT = 1205; const PREFIX = "INP"; const SUFFIX = "FTY";
    
    let dbNilai = JSON.parse(localStorage.getItem('db_edunexa_v9')) || {};
    let dbSiswa = JSON.parse(localStorage.getItem('db_siswa_v9')) || {};
    let activeClasses = JSON.parse(localStorage.getItem('active_classes')) || [];

    // --- LOGIKA AKTIVASI ASLI BAPAK ---
    function getDeviceId() {
        let id = localStorage.getItem('edx_device_id');
        if (!id) { id = 'DX-' + Math.floor(Math.random() * 900000 + 100000); localStorage.setItem('edx_device_id', id); }
        return id;
    }
    function generateKey(id) {
        let cleanId = id.replace(/\s/g, '').toUpperCase();
        let totalASCII = 0;
        for (let i = 0; i < cleanId.length; i++) totalASCII += cleanId.charCodeAt(i);
        return PREFIX + (totalASCII * SALT) + SUFFIX;
    }
    function checkActivation() {
        const input = document.getElementById('activationCode').value.trim().toUpperCase();
        const correct = generateKey(getDeviceId());
        if (input === correct) { localStorage.setItem('edx_activated', 'true'); location.reload(); }
        else { alert("Kode salah!"); }
    }

    // --- LOGIKA APLIKASI ---
    window.onload = () => {
        if (localStorage.getItem('edx_activated') === 'true') {
            if (activeClasses.length > 0) {
                document.getElementById('inputArea').style.display = 'block';
                const sel = document.getElementById('mapel');
                activeClasses.forEach(c => sel.innerHTML += `<option>${c}</option>`);
                renderSiswa();
            } else {
                document.getElementById('classSelectionArea').style.display = 'block';
                CLASSES.forEach(c => document.getElementById('classChecklist').innerHTML += `<div><input type="checkbox" value="${c}"> ${c}</div>`);
            }
        } else {
            document.getElementById('activationGate').style.display = 'flex';
            document.getElementById('myDeviceId').innerText = getDeviceId();
        }
    };

    function saveClassSelection() {
        activeClasses = Array.from(document.querySelectorAll('#classChecklist input:checked')).map(cb => cb.value);
        localStorage.setItem('active_classes', JSON.stringify(activeClasses));
        location.reload();
    }

    function renderSiswa() {
        const cls = document.getElementById('mapel').value;
        const siswa = dbSiswa[cls] || [];
        document.getElementById('listSiswaContainer').innerHTML = "<h3>Daftar Siswa</h3>" + siswa.map((n, i) => `<div class="siswa-row"><span>${i+1}. ${n}</span><input type="number" class="nilai-input" id="n-${i}"></div>`).join('');
        document.getElementById('rawSiswa').value = siswa.join('\n');
    }

    function simpanSiswa() {
        const cls = document.getElementById('mapel').value;
        dbSiswa[cls] = document.getElementById('rawSiswa').value.split('\n').filter(s => s.trim());
        localStorage.setItem('db_siswa_v9', JSON.stringify(dbSiswa));
        toggleSetup(); renderSiswa();
    }

    function simpanKeHP() {
        const cls = document.getElementById('mapel').value;
        if (!dbNilai[cls]) dbNilai[cls] = {};
        dbNilai[cls][document.getElementById('materi').value] = (dbSiswa[cls] || []).map((_, i) => document.getElementById(`n-${i}`).value);
        localStorage.setItem('db_edunexa_v9', JSON.stringify(dbNilai));
        alert("Disimpan!");
    }

    function toggleSetup() { document.getElementById('inputArea').style.display = document.getElementById('inputArea').style.display === 'none' ? 'block' : 'none'; document.getElementById('setupArea').style.display = document.getElementById('setupArea').style.display === 'none' ? 'block' : 'none'; }
    function bagikanCSV() { alert("Fitur ekspor disesuaikan dengan kelas aktif."); }
</script>
</body>
</html>
