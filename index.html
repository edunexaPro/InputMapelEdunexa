<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Edunexa - Tomy Satria</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.ibb.co/YSHKvYQ/Chat-GPT-Image-5-Jun-2026-22-30-27.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        /* --- STYLING --- */
        :root { --primary: #4f46e5; --brand: #1e293b; --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 50%, #e2e8f0 100%); --card-bg: rgba(255, 255, 255, 0.65); --card-border: rgba(255, 255, 255, 0.8); --danger: #ef4444; --gray: #64748b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-gradient); background-attachment: fixed; margin: 0; padding: 16px; padding-bottom: 110px; color: #334155; }
        .header { text-align: center; padding: 20px 0 15px 0; }
        .card { background: var(--card-bg); backdrop-filter: blur(16px); padding: 20px; border-radius: 20px; border: 1px solid var(--card-border); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); margin-bottom: 20px; }
        select, input[type="text"], input[type="date"], textarea { width: 100%; padding: 14px 16px; margin-bottom: 16px; background: rgba(255, 255, 255, 0.9); border: 1px solid #cbd5e1; border-radius: 14px; box-sizing: border-box; font-size: 15px; color: var(--brand); }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); padding: 16px 20px 24px 20px; display: flex; gap: 12px; z-index: 100; border-top: 1px solid rgba(255,255,255,0.5); }
        button { border: none; font-weight: 800; cursor: pointer; padding: 16px; border-radius: 16px; }
        .btn-main { background: var(--primary); color: white; flex: 2; }
        .btn-side { background: #cbd5e1; color: var(--brand); flex: 1; }
        .btn-outline { background: white; border: 1px solid #cbd5e1; width: 100%; padding: 14px; border-radius: 14px; margin-bottom: 10px; }
        .siswa-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 8px; border-bottom: 1px solid rgba(203, 213, 225, 0.5); }
        .nilai-input { width: 70px !important; text-align: center; font-weight: 800; font-size: 16px; color: var(--primary); height: 48px; border-radius: 12px; }
        
        /* Layout Kelas Checklist */
        .class-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(15, auto); grid-auto-flow: column; gap: 5px; margin-top: 15px; }
        .class-item { background: white; padding: 8px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 12px; font-weight: 600; }
        .badge { background: rgba(255, 255, 255, 0.8); color: var(--gray); padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 700; border: 1px solid #cbd5e1; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-delete-badge { color: #ef4444; font-weight: 800; font-size: 16px; line-height: 1; }
        .history-box { display: flex; flex-wrap: wrap; gap: 8px; }
        #activationGate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-gradient); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .gate-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .gate-id { background: #e0e7ff; padding: 15px; border-radius: 10px; font-weight: 800; font-family: monospace; font-size: 18px; margin: 15px 0; color: var(--primary); }
    </style>
</head>
<body>

<div id="activationGate" style="display:none;">
    <div class="gate-card">
        <h2>Aktivasi Edunexa</h2>
        <div class="gate-id" id="myDeviceId">---</div>
        <input type="text" id="activationCode" style="text-align:center;" placeholder="Masukkan Kode Aktivasi">
        <button class="btn-main" style="width: 100%;" onclick="checkActivation()">AKTIFKAN</button>
    </div>
</div>

<div id="classGate" style="display:none;">
    <div class="card">
        <h3>Pilih Kelas yang Diajar</h3>
        <div class="class-grid" id="classChecklist"></div>
        <button class="btn-main" style="width: 100%; margin-top: 20px;" onclick="saveClassSelection()">SIMPAN KELAS</button>
    </div>
</div>

<div id="inputArea" style="display:none;">
    <div class="header"><h1>INPUT NILAI EDUNEXA</h1></div>

    <!-- 1. KONTROL KELAS -->
    <div class="card">
        <h3>Kontrol Kelas</h3>
        <select id="mapel" onchange="renderSiswa()"></select>
        <button class="btn-outline" onclick="showClassGate()">EDIT DAFTAR KELAS</button>
    </div>

    <!-- 2. DATA SISWA -->
    <div class="card">
        <div class="siswa-info-flex" style="display: flex; justify-content: space-between;">
            <h3>Data Siswa</h3>
            <span class="jml-badge" id="displayJml">0 Siswa</span>
        </div>
        <button class="btn-outline" onclick="toggleSetup()">EDIT DAFTAR NAMA</button>
    </div>

    <!-- 3. ARSIP MATERI -->
    <div class="card">
        <h3>Arsip Materi</h3>
        <div id="riwayatMateri" class="history-box"></div>
    </div>

    <!-- 4. INPUT NILAI BARU -->
    <div class="card">
        <h3>Input Nilai Baru</h3>
        <button class="btn-outline" style="color: var(--primary); background: #e0e7ff;" onclick="kosongkanForm()">+ INPUT MATERI BARU</button>
        <input type="date" id="tanggal">
        <input type="text" id="materi" placeholder="Nama Materi" oninput="refreshRiwayat()">
        <div id="listSiswaContainer"></div>
    </div>

    <div class="footer">
        <button class="btn-side" onclick="simpanKeHP()">SIMPAN</button>
        <button class="btn-main" onclick="bagikanCSV()">EKSPOR CSV</button>
    </div>
</div>

<div id="setupArea" style="display:none;">
    <div class="card">
        <h3>Pengaturan Siswa</h3>
        <textarea id="rawSiswa" rows="10"></textarea>
        <button class="btn-main" style="width:100%" onclick="simpanSiswa()">SIMPAN NAMA</button>
        <button class="btn-outline" onclick="toggleSetup()">KEMBALI</button>
    </div>
</div>

<script>
    const KELAS_LIST = ["Kelas 1", "Kelas 1A", "Kelas 1B", "Kelas 1C", "Kelas 1D", "Kelas 2", "Kelas 2A", "Kelas 2B", "Kelas 2C", "Kelas 2D", "Kelas 3", "Kelas 3A", "Kelas 3B", "Kelas 3C", "Kelas 3D", "Kelas 4", "Kelas 4A", "Kelas 4B", "Kelas 4C", "Kelas 4D", "Kelas 5", "Kelas 5A", "Kelas 5B", "Kelas 5C", "Kelas 5D", "Kelas 6", "Kelas 6A", "Kelas 6B", "Kelas 6C", "Kelas 6D"];
    let dbNilai = JSON.parse(localStorage.getItem('db_edunexa_v8')) || {};
    let dbSiswa = JSON.parse(localStorage.getItem('db_siswa_v8')) || {};
    let activeClasses = JSON.parse(localStorage.getItem('active_classes')) || [];

    window.onload = () => {
        if (localStorage.getItem('edx_activated') === 'true') {
            if (activeClasses.length > 0) {
                document.getElementById('inputArea').style.display = 'block';
                const sel = document.getElementById('mapel');
                activeClasses.forEach(c => sel.innerHTML += `<option>${c}</option>`);
                renderSiswa();
            } else { showClassGate(); }
        } else {
            document.getElementById('activationGate').style.display = 'flex';
            document.getElementById('myDeviceId').innerText = 'DX-' + Math.floor(Math.random() * 900000 + 100000);
        }
    };

    function showClassGate() {
        document.getElementById('inputArea').style.display = 'none';
        document.getElementById('classGate').style.display = 'block';
        const list = document.getElementById('classChecklist');
        list.innerHTML = "";
        KELAS_LIST.forEach(cls => {
            list.innerHTML += `<div class="class-item"><input type="checkbox" value="${cls}" ${activeClasses.includes(cls) ? 'checked' : ''}> ${cls}</div>`;
        });
    }

    function saveClassSelection() {
        activeClasses = Array.from(document.querySelectorAll('#classChecklist input:checked')).map(cb => cb.value);
        localStorage.setItem('active_classes', JSON.stringify(activeClasses));
        location.reload();
    }

    function renderSiswa() {
        const mapel = document.getElementById('mapel').value;
        const siswa = dbSiswa[mapel] || [];
        const container = document.getElementById('listSiswaContainer');
        container.innerHTML = "";
        document.getElementById('displayJml').innerText = siswa.length + " Siswa";
        siswa.forEach((nama, idx) => {
            const row = document.createElement('div');
            row.className = 'siswa-row';
            row.innerHTML = `<div class="nama-siswa">${idx + 1}. ${nama}</div><input type="number" class="nilai-input" id="n-${idx}" onfocus="this.select()">`;
            container.appendChild(row);
        });
        document.getElementById('rawSiswa').value = siswa.join('\n');
        refreshRiwayat();
    }

    function simpanSiswa() {
        const mapel = document.getElementById('mapel').value;
        dbSiswa[mapel] = document.getElementById('rawSiswa').value.split('\n').map(s => s.trim()).filter(s => s !== "");
        localStorage.setItem('db_siswa_v8', JSON.stringify(dbSiswa));
        toggleSetup(); renderSiswa();
    }

    function simpanKeHP() {
        const mapel = document.getElementById('mapel').value;
        const materi = document.getElementById('materi').value.trim();
        if (!materi) return alert("Tuliskan nama Materinya!");
        const inputs = document.querySelectorAll('.nilai-input');
        let nilai = Array.from(inputs).map(inp => inp.value || "0");
        if (!dbNilai[mapel]) dbNilai[mapel] = {};
        dbNilai[mapel][materi] = nilai;
        localStorage.setItem('db_edunexa_v8', JSON.stringify(dbNilai));
        alert("✅ Disimpan!");
        refreshRiwayat();
    }

    // --- LOGIKA AKTIVASI & FUNGSI LAIN (TETAP SAMA) ---
    function checkActivation() {
        const id = document.getElementById('myDeviceId').innerText;
        let totalASCII = 0; for (let i = 0; i < id.length; i++) totalASCII += id.charCodeAt(i);
        const correct = "INP" + (totalASCII * 1205) + "FTY";
        if (document.getElementById('activationCode').value.trim().toUpperCase() === correct) { localStorage.setItem('edx_activated', 'true'); location.reload(); }
        else alert("Kode salah!");
    }
    function refreshRiwayat() {
        const mapel = document.getElementById('mapel').value;
        const box = document.getElementById('riwayatMateri');
        const materiAktif = document.getElementById('materi').value.trim();
        box.innerHTML = "";
        if (dbNilai[mapel]) {
            for (let m in dbNilai[mapel]) {
                const b = document.createElement('span');
                b.className = 'badge'; 
                b.innerHTML = `${m} <span class="btn-delete-badge" onclick="hapusMateri(event, '${m}')">&times;</span>`;
                if (m === materiAktif) b.style.background = '#e0e7ff';
                b.onclick = function() { loadMateriLama(m); };
                box.appendChild(b);
            }
        }
    }
    function hapusMateri(e, namaMateri) {
        e.stopPropagation();
        if(confirm("Hapus materi '" + namaMateri + "'?")) {
            const mapel = document.getElementById('mapel').value;
            delete dbNilai[mapel][namaMateri];
            localStorage.setItem('db_edunexa_v8', JSON.stringify(dbNilai));
            kosongkanForm(); refreshRiwayat();
        }
    }
    function loadMateriLama(namaMateri) {
        document.getElementById('materi').value = namaMateri;
        const mapel = document.getElementById('mapel').value;
        const inputs = document.querySelectorAll('.nilai-input');
        if (dbNilai[mapel] && dbNilai[mapel][namaMateri]) {
            inputs.forEach((inp, idx) => inp.value = dbNilai[mapel][namaMateri][idx] || "");
        }
        refreshRiwayat();
    }
    function setTanggalHariIni() { document.getElementById('tanggal').value = new Date().toISOString().split('T')[0]; }
    function toggleSetup() { document.getElementById('inputArea').style.display = document.getElementById('inputArea').style.display === 'none' ? 'block' : 'none'; document.getElementById('setupArea').style.display = document.getElementById('setupArea').style.display === 'none' ? 'block' : 'none'; }
    function kosongkanForm() { document.getElementById('materi').value = ""; document.querySelectorAll('.nilai-input').forEach(inp => inp.value = ""); setTanggalHariIni(); refreshRiwayat(); }
    function bagikanCSV() {
        const mapel = document.getElementById('mapel').value;
        const materi = document.getElementById('materi').value.trim();
        if (!materi || !dbNilai[mapel] || !dbNilai[mapel][materi]) return alert("Data tidak ditemukan!");
        let csv = "Nama;" + materi + "\n";
        (dbSiswa[mapel] || []).forEach((nama, idx) => { csv += nama + ";" + (dbNilai[mapel][materi][idx] || "0") + "\n"; });
        const file = new File([csv], `Nilai_${mapel}_${materi}.csv`, { type: 'text/csv' });
        if (navigator.canShare) await navigator.share({ files: [file] }).catch(()=>{});
        else { const a = document.createElement('a'); a.href = URL.createObjectURL(file); a.download = file.name; a.click(); }
    }
</script>
</body>
</html>
